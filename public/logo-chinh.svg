<svg width="340" height="106" viewBox="0 0 340 106" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="og" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E8501A"/>
    </linearGradient>
  </defs>

  <!-- ── Headphone center=(38,52), width≈68px height≈86px ratio~0.8:1 ── -->
  <g transform="translate(38,52)">

    <!-- arc dày -->
    <path d="M-26 8 Q-26,-42 0,-42 Q26,-42 26,8"
          fill="none" stroke="url(#og)" stroke-width="8" stroke-linecap="round"/>

    <!-- left earcup -->
    <rect x="-34" y="5"  width="20" height="40" rx="10" fill="url(#og)"/>
    <rect x="-32" y="8"  width="12" height="26" rx="6"  fill="#B03210" opacity="0.4"/>

    <!-- right earcup -->
    <rect x="14"  y="5"  width="20" height="40" rx="10" fill="url(#og)"/>
    <rect x="16"  y="8"  width="12" height="26" rx="6"  fill="#B03210" opacity="0.4"/>

    <!-- ── Sound bars — giữa 2 chụp tai (gap x=-14..14, center y=25) ── -->
    <g opacity="0.9">
      <rect x="-11" y="22" width="3" height="6"  rx="1.5" fill="#FF6B35"/>
      <rect x="-7"  y="18" width="3" height="14" rx="1.5" fill="#FF6B35"/>
      <rect x="-3"  y="15" width="3" height="20" rx="1.5" fill="#FF6B35"/>
      <rect x="1"   y="19" width="3" height="12" rx="1.5" fill="#FF6B35"/>
      <rect x="5"   y="17" width="3" height="16" rx="1.5" fill="#FF6B35"/>
      <rect x="9"   y="22" width="3" height="6"  rx="1.5" fill="#FF6B35"/>
    </g>
  </g>

  <!-- ── Divider ── -->
  <line x1="80" y1="8" x2="80" y2="98" stroke="#FF6B35" stroke-width="1" opacity="0.2"/>

  <!-- ══ TRUYỆN ══ -->
  <text x="90" y="28"
    font-family="Arial,sans-serif"
    font-size="18" font-weight="700"
    fill="#FF6B35" letter-spacing="3">TRUYỆN</text>

  <!-- ══ CỦA TÔI ══ -->
  <text x="200" y="28"
    font-family="Arial,sans-serif"
    font-size="18" font-weight="700"
    fill="#FF6B35" letter-spacing="2">CỦA TÔI</text>

  <!-- underline -->
  <rect x="90" y="33" width="46" height="1.5" rx="0.6" fill="#FF6B35" opacity="0.5"/>

  <!-- ══ AUDIO ══ -->
  <text x="90" y="70"
    font-family="'Arial Black',Arial,sans-serif"
    font-size="30" font-weight="900"
    fill="white" letter-spacing="1">AUDIO</text>

  <!-- ══ Tagline ══ -->
  <text x="90" y="96"
    font-family="Arial,sans-serif"
    font-size="21" font-weight="400"
    fill="#FF6B35" letter-spacing="1" opacity="0.9">Nghe mọi lúc mọi nơi</text>

</svg>
