name: Keep Neon DB Alive

on:
  schedule:
    - cron: '*/4 * * * *'  # mỗi 4 phút — tránh Neon idle timeout 5 phút
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keep-alive endpoint
        run: |
          curl -f -s "${{ secrets.APP_URL }}/api/keep-alive" \
            -H "x-manual-check: true" \
            || echo "Ping failed"
