name: Keep Neon DB Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # mỗi 5 phút
  workflow_dispatch:        # cho phép chạy thủ công trên GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keep-alive endpoint
        run: |
          curl -f -s "${{ secrets.APP_URL }}/api/keep-alive" \
            -H "x-manual-check: true" \
            || echo "Ping failed"
